<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker - Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto">
      <!-- Start Navbar -->
      <div
        class="navbar bg-white shadow-sm px-4 py-3 flex flex-col md:flex-row gap-3"
      >
        <div
          class="flex items-center justify-center md:justify-start gap-2 w-full md:w-auto text-center md:text-left"
        >
          <i class="fa-brands fa-github text-2xl"></i>
          <h2 class="text-sm md:text-xl font-semibold">
            GitHub Issues Tracker
          </h2>
        </div>

        <div class="flex gap-2 w-full md:w-auto md:ml-auto">
          <input
            id="inputSearch"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-full md:w-64"
          />

          <button id="btnSearch" class="btn btn-primary text-sm w-12 md:w-auto">
            <i class="fa-solid fa-plus"></i>
            <span class="hidden md:inline">New Issue</span>
          </button>
        </div>
      </div>
      <!-- End Navbar -->
      <!-- Start Main Container -->
      <div class="max-w-7xl mx-auto mt-10 py-4">
        <!--Start Tabs -->
        <div class="bg-white p-4 rounded-lg shadow mb-6">
          <div class="flex gap-3">
            <button id="allBtn" class="btn btn-primary btnColor">All</button>

            <button id="openBtn" class="btn btn-outline btnColor">Open</button>

            <button id="closedBtn" class="btn btn-outline btnColor">
              Closed
            </button>
          </div>
        </div>

        <!-- End Tabs -->

        <!--Start Issue Header -->
        <div
          class="bg-white p-6 rounded-lg shadow mb-6 flex justify-between items-center"
        >
          <div class="flex items-center gap-3">
            <div class="bg-purple-100 p-3 rounded-full">
              <img src="./assets/Aperture.png" alt="" />
            </div>
            <div>
              <h3 class="font-semibold text-lg issuCount">0 Issues</h3>
              <p class="text-gray-500 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-2 md:gap-4 text-sm">
            <div class="flex items-center gap-1">
              <span class="w-3 h-3 bg-green-500 rounded-full"></span> Open
            </div>
            <div class="flex items-center gap-1">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed
            </div>
          </div>
        </div>
        <!--End Issue Header -->

        <!-- Start Spinner -->
        <div
          id="spinnerId"
          class="flex justify-center items-center py-10 hidden"
        >
          <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <!-- Start Spinner -->

        <div
          id="noDataContainer"
          class="w-full md:h-[500px] h-[300px] flex justify-center items-center hidden"
        ></div>

        <!-- Cards -->

        <div
          id="issuesContainer"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"
        ></div>
      </div>
      <!-- End Main Container -->
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
