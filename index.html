<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-md bg-white rounded-xl shadow-lg border border-dashed border-blue-400 p-8"
    >
      <div class="flex flex-col items-center mb-8 text-center">
        <div class="text-6xl text-slate-800 mb-4">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h1 class="text-2xl font-bold text-slate-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mt-1 text-sm">Sign in to manage your issues</p>
      </div>

      <form id="loginForm">
        <div class="form-control w-full mb-4">
          <label class="label">
            <span class="label-text font-semibold text-slate-700"
              >Username</span
            >
          </label>
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            required
            class="input input-bordered w-full focus:outline-none focus:border-blue-500"
          />
          <label class="label">
            <span class="label-text-alt text-indigo-600 font-medium"
              >Default: admin</span
            >
          </label>
        </div>

        <div class="form-control w-full mb-6">
          <label class="label">
            <span class="label-text font-semibold text-slate-700"
              >Password</span
            >
          </label>
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
            class="input input-bordered w-full focus:outline-none focus:border-blue-500"
          />
          <label class="label">
            <span class="label-text-alt text-indigo-600 font-medium"
              >Default: admin123</span
            >
          </label>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-full bg-blue-600 hover:bg-blue-700 border-none normal-case text-lg text-white"
        >
          Sign In
        </button>
      </form>
      <div class="divider my-8 text-gray-400 font-light text-sm">OR</div>

      <div class="bg-slate-50 rounded-lg p-6 text-center">
        <p
          class="text-xs uppercase tracking-wider text-gray-400 font-bold mb-3"
        >
          Demo Credentials
        </p>
        <div class="text-slate-800">
          <p><span class="font-bold">Username:</span> admin</p>
          <p><span class="font-bold">Password:</span> admin123</p>
        </div>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
